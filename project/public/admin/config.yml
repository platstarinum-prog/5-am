backend:
  name: git-gateway
  repo: ТВОЙ_НИК_НА_GITHUB/НАЗВАНИЕ_РЕПОЗИТОРИЯ # ОБЯЗАТЕЛЬНО УКАЖИ ЭТО
  branch: main

# Указываем пути строго от корня репозитория (без всяких project/)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

format: "json"

collections:
  - name: "products"
    label: "Каталог товаров"
    folder: "src/data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID товара", name: "id", widget: "string" }
      - { label: "Название товара", name: "name", widget: "string" }
      - { label: "Бренд", name: "brand", widget: "string", default: "5AM" }
      - { label: "Цена", name: "price", widget: "number", value_type: "int" }
      - { label: "Изображение товара", name: "image", widget: "image" }
      - { label: "Размеры", name: "sizes", widget: "string", default: "S, M, L, XL" }
      - { label: "Telegram", name: "seller_tg", widget: "string", default: "5am_store_official" }
      - { label: "Состояние", name: "condition", widget: "string", default: "New" }
      - { label: "Продано", name: "sold", widget: "boolean", default: false }

  - name: "faq"
    label: "Часто задаваемые вопросы"
    file: "src/data/faq.json"
    fields:
      - name: "items"
        label: "Вопросы"
        widget: "list"
        fields:
          - { label: "Вопрос", name: "question_ru", widget: "string" }
          - { label: "Ответ", name: "answer_ru", widget: "text" }
